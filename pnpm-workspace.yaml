packages:
  - 'platform/*/*'
  - 'apps/*'
  # NOTE: platform/*/* covers the five platform categories plus
  # platform/controlplane/ui; platform/controlplane/service is Java/Maven with no
  # package.json, so the glob skips it. examples/ and workspace-template/ are scripts/scaffold, not packages.
  #
  # pnpm settings (overrides, onlyBuiltDependencies) live in package.json's "pnpm"
  # field, NOT here: the pinned pnpm 9.15.9 reads them from package.json. (pnpm 10+
  # moves them here — do that as part of a deliberate pnpm-10 upgrade.)
