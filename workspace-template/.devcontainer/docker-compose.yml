# Always-on triad orchestration.
#
# Composition:
#   - 3 your-code services (harness-server, edge-memory-server, edge-context-server)
#     built from local Dockerfiles. Communicate via UDS in the shared
#     `../.harness/run` bind-mount.
#   - 2 off-the-shelf model sidecars (embedder, agent-llm) from Docker's `ai/`
#     catalog. Communicate over HTTP on the shared `harness-net` bridge —
#     siblings reach them via service-name DNS (http://embedder:8080,
#     http://agent-llm:8080).
#   - 1 optional model sidecar (agent-vl) profile-gated to `vision`. Only
#     started with `--profile vision`. Saves ~6 GB RAM when not indexing
#     images.
#
# Workers are spawned per-job via @devcontainers/cli — NOT in this compose
# file. Worker containers attach to `agentx-harness-net` by name so they can
# reach the model sidecars + UDS-mount the shared run dir.
#
# Local vs deployed
# ─────────────────
# This file is the *local* stack. Models are all `ai/...` from the Docker
# Model Runner catalog so the same llama.cpp runtime serves chat, embed,
# and vision. Deployed (ECS) targets swap the embedder + chat LLM to AWS
# Bedrock at the URL boundary — same OpenAI-compatible client code, just
# different OPENAI_BASE_URL. The `bench` profile below pits local Qwen
# against Bedrock side-by-side so the local-vs-deployed quality gap is
# measurable, not assumed.
#
# Run from this directory:
#   cd workspace-template/.devcontainer
#   docker compose up --build                          # 5 long-running services
#   docker compose --profile vision up --build         # + agent-vl
#   docker compose --profile bench up --build          # + qwen-vs-bedrock embedders
#
# Then from a sibling terminal:
#   cd workspace-template
#   pnpm harness server status     # ✓ for all 3 your-code services
#
# Smoke-test the model sidecars (from inside any sibling container):
#   docker exec -it agentx-harness-server \
#     curl -s http://embedder:8080/v1/models
#   docker exec -it agentx-harness-server \
#     curl -s http://agent-llm:8080/v1/models

name: agentx-triad

services:
  # ─── your code (Node, your Dockerfiles) ──────────────────────
  harness-server:
    build:
      context: ../..
      dockerfile: workspace-template/.devcontainer/harness-server/Dockerfile
    container_name: agentx-harness-server
    volumes:
      - ../.harness/run:/root/.harness/run
    networks:
      - harness-net
    restart: unless-stopped

  edge-memory-server:
    build:
      context: ../..
      dockerfile: workspace-template/.devcontainer/edge-memory-server/Dockerfile
    container_name: agentx-edge-memory-server
    volumes:
      - ../.harness/run:/root/.harness/run
    networks:
      - harness-net
    restart: unless-stopped

  edge-context-server:
    build:
      context: ../..
      dockerfile: workspace-template/.devcontainer/edge-context-server/Dockerfile
    container_name: agentx-edge-context-server
    volumes:
      - ../.harness/run:/root/.harness/run
    networks:
      - harness-net
    restart: unless-stopped

  # ─── off-the-shelf model sidecars (Docker's ai/ catalog) ─────
  # Pulled images, not built. Each exposes an OpenAI-compatible HTTP API
  # on its container port; siblings reach them via service-name DNS on
  # the shared `harness-net` bridge.

  # Text embedder — used by edge-memory + edge-context to vectorize content,
  # and by @agentx/context-loader-core to index source content into Kuzu.
  #
  # Default: ai/qwen3-embedding:0.6B-F16 (1024-dim native, no MRL truncation
  # needed; ~1.1 GB image, ~2.3 GB VRAM, multilingual across 119 languages).
  # Same dim as Bedrock Titan Embeddings v2, so a workspace indexed locally
  # can be queried in deployed mode without reindexing — the vector space
  # is *similar* (cosine-comparable per-position) but not identical, hence
  # the bench profile below for measuring the quality gap.
  #
  # Pinned in workspace memory at project_embedder_choice.md.
  embedder:
    image: ai/qwen3-embedding:0.6B-F16
    container_name: agentx-embedder
    networks:
      - harness-net
    restart: unless-stopped

  # Self-hosted agent LLM — used by opencode-cli adapter when pipelines
  # opt in via `config.endpoint = http://agent-llm:8080/v1`. 8B-Q4_K_M
  # is the workhorse default (~4.7 GB image, ~6 GB working set). For
  # higher quality on Mac Studio class hardware, switch to
  # `30B-A3B-Q4_K_M` (MoE, ~17 GB, ~3B active params per token).
  agent-llm:
    image: ai/qwen3-coder:8B-Q4_K_M
    container_name: agentx-agent-llm
    networks:
      - harness-net
    restart: unless-stopped

  # Vision LLM — only needed if your corpus includes images (UI mockups,
  # screenshots, diagrams). Profile-gated so it doesn't start by default,
  # saving ~3-6 GB RAM in the common code-only workflow. Enable with:
  #   docker compose --profile vision up
  #
  # Tag options (verified via Docker Hub):
  #   2B-UD-Q4_K_XL   1.82 GB   smallest; tight footprint
  #   4B-UD-Q4_K_XL   3.15 GB   workhorse default — picked here
  #   8B-UD-Q4_K_XL   5.87 GB   higher quality (= `latest`)
  #   32B-UD-Q4_K_XL  19.8 GB   Mac Studio territory; GPU recommended
  agent-vl:
    image: ai/qwen3-vl:4B-UD-Q4_K_XL
    container_name: agentx-agent-vl
    networks:
      - harness-net
    restart: unless-stopped
    profiles:
      - vision

  # ─── Bench profile: local Qwen vs Bedrock Titan v2 ───────────────────
  # Bring up with `docker compose --profile bench up --build`. Each lane
  # gets its own DNS name on harness-net; the context-loader CLI points
  # at any of them via --embedder-url and writes to a separate Kuzu
  # directory so vector spaces stay isolated.
  #
  # The Bedrock lane needs AWS credentials. Two options (pick one):
  #   1) Mount your shared cred file (matches local AWS CLI workflow):
  #        export AWS_PROFILE=your-profile
  #      The compose file mounts ~/.aws:/root/.aws:ro into LiteLLM.
  #   2) Set explicit env vars (CI-friendly, no host file):
  #        export AWS_ACCESS_KEY_ID=...
  #        export AWS_SECRET_ACCESS_KEY=...
  #        export AWS_REGION=us-east-1
  #
  # Usage:
  #   docker compose --profile bench up
  #   agentx-load --embedder-url http://embedder-qwen-small:8080/v1 \
  #               --backend kuzu://./data/bench-qwen-0.6 <repo>
  #   agentx-load --embedder-url http://embedder-qwen-large:8080/v1 \
  #               --backend kuzu://./data/bench-qwen-4 <repo>
  #   agentx-load --embedder-url http://embedder-bedrock:4000/v1 \
  #               --backend kuzu://./data/bench-bedrock <repo>
  #
  # All three produce 1024-dim vectors (qwen-large via MRL truncation
  # passed as `dimensions: 1024` in the request; bedrock-titan-v2 native).
  embedder-qwen-small:
    image: ai/qwen3-embedding:0.6B-F16
    container_name: agentx-embedder-qwen-small
    networks: [harness-net]
    profiles: [bench]

  embedder-qwen-large:
    image: ai/qwen3-embedding:4B-Q4_K_M
    container_name: agentx-embedder-qwen-large
    networks: [harness-net]
    profiles: [bench]

  embedder-bedrock:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: agentx-embedder-bedrock
    command: ["--config", "/app/litellm.config.yaml", "--port", "4000"]
    volumes:
      - ./litellm.config.yaml:/app/litellm.config.yaml:ro
      - ${HOME}/.aws:/root/.aws:ro
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE:-default}
    networks: [harness-net]
    profiles: [bench]

networks:
  harness-net:
    driver: bridge
    name: agentx-harness-net
