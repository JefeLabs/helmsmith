# Off-the-shelf sidecars the host triad depends on.
#
# Architecture: harness-server, edge-memory-server, and edge-context-server
# run as Node processes on the host (`pnpm dev:servers`). This compose file
# brings up the things that CAN'T be Node modules — databases and AI model
# runtimes — alongside that host triad.
#
# Composition:
#   - `neo4j-edge`        — Neo4j 5 Community sidecar, the graph store
#                           edge-context-server dials via Bolt.
#   - `embedder`, `agent-llm`  — Docker Model Runner sidecars (llama.cpp).
#   - `agent-vl`          — vision LLM, profile-gated to `vision`.
#   - bench profile       — qwen-small / qwen-large / bedrock embedders for
#                           side-by-side quality measurement.
#
# Workers are spawned per-job via @devcontainers/cli — NOT in this compose
# file. Worker containers should attach to `agentx-harness-net` by name so
# they can reach the model sidecars + UDS-mount the shared run dir.
# (Note: spawn-worker.ts does not currently add `--network agentx-harness-net`
# to its runArgs; workers reach Neo4j transitively through the host triad's
# UDS bind-mount, and reach the model sidecars via host-port mappings.)
#
# Local vs deployed
# ─────────────────
# This file is the *local* stack. Models are all `ai/...` from the Docker
# Model Runner catalog so the same llama.cpp runtime serves chat, embed,
# and vision. Deployed (ECS) targets swap the embedder + chat LLM to AWS
# Bedrock at the URL boundary — same OpenAI-compatible client code, just
# different OPENAI_BASE_URL. The `bench` profile below pits local Qwen
# against Bedrock side-by-side so the local-vs-deployed quality gap is
# measurable, not assumed.
#
# Run from this directory:
#   cd workspace-template/.devcontainer
#   docker compose up                          # neo4j + 2 model sidecars
#   docker compose --profile vision up         # + agent-vl
#   docker compose --profile bench up          # + qwen-vs-bedrock embedders
#
# Then from another terminal at the monorepo root:
#   pnpm dev:servers               # starts the host triad (Node processes)
#   pnpm harness server status     # ✓ harness, memory, context all running
#
# Smoke-test the model sidecars from the host:
#   curl -s http://localhost:12434/engines/llama.cpp/v1/models
#
# Sibling services that need the model URL inside the network should
# `depends_on` the model service to receive the injected
# `<NAME>_URL` env var (e.g., depend on `embedder` → `EMBEDDER_URL`).

name: agentx-sidecars

services:
  # ─── off-the-shelf model sidecars (Docker Model Runner) ──────
  # AI models from Docker's `ai/` catalog don't run as plain containers
  # — Docker Engine refuses `image: ai/...` with "AI models are not yet
  # supported by the Engine." They're served by Docker Model Runner, the
  # `docker model` daemon shipped with Docker Desktop 4.40+. Compose's
  # `provider: { type: model }` block is the documented integration:
  # Compose tells the runner to pull/load the model and exposes it to
  # depending services via injected `<NAME>_URL` + `<NAME>_MODEL` env
  # vars (e.g., depend on `embedder` → get `EMBEDDER_URL=http://...`).
  #
  # ONE-TIME PREREQUISITE — enable the runner in Docker Desktop:
  #   Settings → AI → ✓ Enable Docker Model Runner
  # The default TCP port is 12434; that's the port everything below
  # assumes. If you change it in DD, update the EMBEDDER_URL examples
  # in the compose comments + any consumer's --embedder-url flag.
  #
  # Inside the network, the runner serves the OpenAI-compatible API at
  # `http://model-runner.docker.internal/engines/llama.cpp/v1`. From the
  # host, it's `http://localhost:12434/engines/llama.cpp/v1`. Siblings
  # can also rely on the injected env vars per their own depends_on.

  # Text embedder — used by edge-memory + edge-context to vectorize
  # content, and by @agentx/context-loader-core to index source content
  # into the local `neo4j-edge` graph store.
  #
  # Default: ai/qwen3-embedding:0.6B-F16 (1024-dim native, no MRL
  # truncation; ~1.1 GB image, ~2.3 GB VRAM, multilingual across 119
  # languages). Same dim as Bedrock Titan Embeddings v2 — a workspace
  # indexed locally can be queried in deployed mode without reindexing.
  # See workspace memory project_embedder_choice.
  embedder:
    provider:
      type: model
      options:
        model: ai/qwen3-embedding:0.6B-F16

  # Self-hosted agent LLM — used by opencode-cli adapter when pipelines
  # opt in via `config.endpoint = $AGENT_LLM_URL`. 8B-Q4_K_M is the
  # workhorse default (~4.7 GB image, ~6 GB working set). For higher
  # quality on Mac Studio class hardware, switch to `30B-A3B-Q4_K_M`
  # (MoE, ~17 GB, ~3B active params per token).
  agent-llm:
    provider:
      type: model
      options:
        model: ai/qwen3-coder:8B-Q4_K_M

  # Vision LLM — only needed if your corpus includes images (UI mockups,
  # screenshots, diagrams). Profile-gated so it doesn't start by default,
  # saving ~3-6 GB RAM in the common code-only workflow. Enable with:
  #   docker compose --profile vision up
  #
  # Tag options (verified via Docker Hub):
  #   2B-UD-Q4_K_XL   1.82 GB   smallest; tight footprint
  #   4B-UD-Q4_K_XL   3.15 GB   workhorse default — picked here
  #   8B-UD-Q4_K_XL   5.87 GB   higher quality (= `latest`)
  #   32B-UD-Q4_K_XL  19.8 GB   Mac Studio territory; GPU recommended
  agent-vl:
    provider:
      type: model
      options:
        model: ai/qwen3-vl:4B-UD-Q4_K_XL
    profiles:
      - vision

  # ─── Edge graph store ────────────────────────────────────────────────
  # Local Neo4j Community sidecar that backs edge-context-server and is
  # the write target for context-loader ingestion runs. The deployed
  # central tier runs the same engine on ECS+EBS; only the bolt:// URL
  # differs (workspace memory: project_central_graph_store_choice).
  #
  # Why a standalone sidecar (not bundled inside edge-context-server):
  # cleaner restarts, clearer `docker compose logs`, and matches the
  # service-DNS pattern of the other sidecars. Note: the ECS task topology
  # (project_ecs_task_topology) co-locates them in one Fargate task —
  # local compose ≠ ECS task topology, and that's expected.
  #
  # Resource defaults are conservative for a developer laptop:
  #   - 1 GB heap, 512 MB pagecache (~1.5 GB JVM working set)
  #   - 2 vCPU max in Fargate central tier; local has no cap
  #
  # Auth: NEO4J_AUTH=neo4j/<password> sets initial credentials. For local
  # dev the default is `neo4j/devpassword`; rotate via env var override
  # before sharing the workspace with anyone outside your machine.
  neo4j-edge:
    image: neo4j:5-community
    container_name: agentx-neo4j-edge
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/devpassword}
      # JVM tuning — see https://neo4j.com/docs/operations-manual/current/performance/memory-configuration/
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
      # Accept license (Community is free; flag is required by the image)
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j-edge-data:/data
      - neo4j-edge-logs:/logs
    networks:
      - harness-net
    # Publish Bolt + HTTP on the host. Bolt is needed by `agentx-load`
    # invocations from outside the network (CI scripts, host shell).
    # HTTP serves Neo4j Browser at localhost:7474 (handy for ad-hoc Cypher).
    # In production / ECS these stay closed — siblings reach Neo4j via
    # service-name DNS on the internal network.
    ports:
      - "7687:7687"
      - "7474:7474"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ─── Bench profile: local Qwen vs Bedrock Titan v2 ───────────────────
  # Bring up with `docker compose --profile bench up --build`. Each lane
  # gets its own DNS name on harness-net; the context-loader CLI points
  # at any of them via --embedder-url and writes to a separate Neo4j
  # database (Community Edition supports only one logical DB, so each
  # lane uses a distinct node label prefix or a separate Neo4j sidecar
  # — see `bench/README.md` for the layout).
  #
  # The Bedrock lane needs AWS credentials. Two options (pick one):
  #   1) Mount your shared cred file (matches local AWS CLI workflow):
  #        export AWS_PROFILE=your-profile
  #      The compose file mounts ~/.aws:/root/.aws:ro into LiteLLM.
  #   2) Set explicit env vars (CI-friendly, no host file):
  #        export AWS_ACCESS_KEY_ID=...
  #        export AWS_SECRET_ACCESS_KEY=...
  #        export AWS_REGION=us-east-1
  #
  # Usage (writes prefix-isolated nodes into a single Neo4j; query with
  # `MATCH (n:Section_qwen_06) ...` style label suffixes):
  #   docker compose --profile bench up
  #   agentx-load --embedder-url $EMBEDDER_QWEN_SMALL_URL \
  #               --backend bolt://neo4j-edge:7687 --label-suffix _qwen_06 <repo>
  #   agentx-load --embedder-url $EMBEDDER_QWEN_LARGE_URL \
  #               --backend bolt://neo4j-edge:7687 --label-suffix _qwen_4  <repo>
  #   agentx-load --embedder-url http://embedder-bedrock:4000/v1 \
  #               --backend bolt://neo4j-edge:7687 --label-suffix _bedrock <repo>
  #
  # The Qwen lanes use Compose's `provider: { type: model }` syntax
  # (Docker Model Runner). Compose injects `EMBEDDER_QWEN_SMALL_URL`
  # and `EMBEDDER_QWEN_LARGE_URL` env vars into any service with a
  # `depends_on` on these. Bedrock stays as a regular container because
  # LiteLLM is a normal HTTP server, not a model.
  #
  # All three produce 1024-dim vectors (qwen-large via MRL truncation
  # passed as `dimensions: 1024` in the request; bedrock-titan-v2 native).
  embedder-qwen-small:
    provider:
      type: model
      options:
        model: ai/qwen3-embedding:0.6B-F16
    profiles: [bench]

  embedder-qwen-large:
    provider:
      type: model
      options:
        model: ai/qwen3-embedding:4B-Q4_K_M
    profiles: [bench]

  embedder-bedrock:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: agentx-embedder-bedrock
    command: ["--config", "/app/litellm.config.yaml", "--port", "4000"]
    volumes:
      - ./litellm.config.yaml:/app/litellm.config.yaml:ro
      - ${HOME}/.aws:/root/.aws:ro
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE:-default}
    networks: [harness-net]
    profiles: [bench]

networks:
  harness-net:
    driver: bridge
    name: agentx-harness-net

volumes:
  # Neo4j Community on edge — graph data + logs persisted across container
  # restarts. Drop the volume to start fresh (`docker volume rm
  # agentx-neo4j-edge-data agentx-neo4j-edge-logs`).
  neo4j-edge-data:
    name: agentx-neo4j-edge-data
  neo4j-edge-logs:
    name: agentx-neo4j-edge-logs
