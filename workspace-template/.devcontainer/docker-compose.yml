# Always-on triad orchestration.
#
# Composition:
#   - 3 your-code services (harness-server, edge-memory-server, edge-context-server)
#     built from local Dockerfiles. Communicate via UDS in the shared
#     `../.harness/run` bind-mount.
#   - 2 off-the-shelf model sidecars (embedder, agent-llm) from Docker's `ai/`
#     catalog. Communicate over HTTP on the shared `harness-net` bridge —
#     siblings reach them via service-name DNS (http://embedder:8080,
#     http://agent-llm:8080).
#   - 1 optional model sidecar (agent-vl) profile-gated to `vision`. Only
#     started with `--profile vision`. Saves ~6 GB RAM when not indexing
#     images.
#
# Workers are spawned per-job via @devcontainers/cli — NOT in this compose
# file. Worker containers attach to `agentx-harness-net` by name so they can
# reach the model sidecars + UDS-mount the shared run dir.
#
# Run from this directory:
#   cd workspace-template/.devcontainer
#   docker compose up --build                          # 5 long-running services
#   docker compose --profile vision up --build         # + agent-vl
#
# Then from a sibling terminal:
#   cd workspace-template
#   pnpm harness server status     # ✓ for all 3 your-code services
#
# Smoke-test the model sidecars:
#   curl -s http://localhost:11434/v1/models           # if you publish ports
#   docker exec -it agentx-harness-server \
#     curl -s http://embedder:8080/v1/models           # internal DNS

name: agentx-triad

services:
  # ─── your code (Node, your Dockerfiles) ──────────────────────
  harness-server:
    build:
      context: ../..
      dockerfile: workspace-template/.devcontainer/harness-server/Dockerfile
    container_name: agentx-harness-server
    volumes:
      - ../.harness/run:/root/.harness/run
    networks:
      - harness-net
    restart: unless-stopped

  edge-memory-server:
    build:
      context: ../..
      dockerfile: workspace-template/.devcontainer/edge-memory-server/Dockerfile
    container_name: agentx-edge-memory-server
    volumes:
      - ../.harness/run:/root/.harness/run
    networks:
      - harness-net
    restart: unless-stopped

  edge-context-server:
    build:
      context: ../..
      dockerfile: workspace-template/.devcontainer/edge-context-server/Dockerfile
    container_name: agentx-edge-context-server
    volumes:
      - ../.harness/run:/root/.harness/run
    networks:
      - harness-net
    restart: unless-stopped

  # ─── off-the-shelf model sidecars (Docker's ai/ catalog) ─────
  # Pulled images, not built. Each exposes an OpenAI-compatible HTTP API
  # on its container port; siblings reach them via service-name DNS on
  # the shared `harness-net` bridge.

  # Text embedder — used by edge-memory + edge-context to vectorize content.
  #
  # Default model: jinaai/jina-embeddings-v3 (1024-dim, strong on both code
  # and prose, multilingual, 8192 context). Pinned in workspace memory at
  # project_embedder_jina_v3.md.
  #
  # Swapping models for testing/benchmarking
  # ────────────────────────────────────────
  # The model is configurable via the EMBEDDER_MODEL env var so you can
  # benchmark alternatives without editing this file. Most popular
  # embedders speak HF safetensors and serve cleanly via TEI:
  #
  #   # default (jina v3, 1024-dim)
  #   docker compose up
  #
  #   # swap to Qwen3-Embedding-0.6B (1024-dim)
  #   EMBEDDER_MODEL=Qwen/Qwen3-Embedding-0.6B docker compose up
  #
  #   # swap to BGE-large-en (1024-dim, English-only)
  #   EMBEDDER_MODEL=BAAI/bge-large-en-v1.5 docker compose up
  #
  #   # swap to mxbai-embed-large (1024-dim)
  #   EMBEDDER_MODEL=mixedbread-ai/mxbai-embed-large-v1 docker compose up
  #
  #   # swap to nomic-embed-text (768-dim — schema dim change!)
  #   EMBEDDER_MODEL=nomic-ai/nomic-embed-text-v1.5 docker compose up
  #
  # NOTE: changing dimension breaks the existing Kuzu / sqlite-vec vector
  # indexes. For dim-mismatch swaps, drop the data volume first:
  #   docker volume rm agentx-tei-model-cache  (model cache; safe)
  #   plus the workspace's .harness/data/{memory,context} dirs (the actual
  #   vector data; destructive — only do this when benchmarking from scratch)
  #
  # Distribution: TEI is HF's production-grade serving for HF embedding
  # models. OpenAI-compatible at /v1/embeddings. cpu-latest is multi-arch
  # (works on M-series Mac + x86_64 Linux). For GPU swap to `latest`
  # (NVIDIA CUDA) and uncomment device_requests below.
  embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: agentx-embedder
    command:
      - --model-id=${EMBEDDER_MODEL:-jinaai/jina-embeddings-v3}
      - --port=8080
    volumes:
      - tei-model-cache:/data
    networks:
      - harness-net
    restart: unless-stopped
    # GPU acceleration (uncomment + switch image to `latest` for CUDA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── Side-by-side embedders for benchmarking (profile=bench) ──────────
  # When you want to compare retrieval quality across multiple embedders,
  # bring up the `bench` profile to run them side-by-side. Each gets its
  # own service name + DNS entry on harness-net; the context-loader CLI
  # can be pointed at any of them via --embedder-url.
  #
  # Usage:
  #   docker compose --profile bench up
  #   agentx-load --embedder-url http://embedder-jina:8080/v1 --backend kuzu://./data/bench-jina <repo>
  #   agentx-load --embedder-url http://embedder-qwen:8080/v1 --backend kuzu://./data/bench-qwen <repo>
  #   agentx-load --embedder-url http://embedder-bge:8080/v1  --backend kuzu://./data/bench-bge  <repo>
  #
  # Each writes to a separate Kuzu directory so vector spaces stay
  # isolated; downstream eval script queries each and compares.
  embedder-jina:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: agentx-embedder-jina
    command: [--model-id=jinaai/jina-embeddings-v3, --port=8080]
    volumes: [tei-model-cache-jina:/data]
    networks: [harness-net]
    profiles: [bench]

  embedder-qwen:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: agentx-embedder-qwen
    command: [--model-id=Qwen/Qwen3-Embedding-0.6B, --port=8080]
    volumes: [tei-model-cache-qwen:/data]
    networks: [harness-net]
    profiles: [bench]

  embedder-bge:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: agentx-embedder-bge
    command: [--model-id=BAAI/bge-large-en-v1.5, --port=8080]
    volumes: [tei-model-cache-bge:/data]
    networks: [harness-net]
    profiles: [bench]

  # Self-hosted agent LLM — used by opencode-cli adapter when pipelines
  # opt in via `config.endpoint = http://agent-llm:8080/v1`. 8B-Q4_K_M
  # is the workhorse default (~4.7 GB image, ~6 GB working set). For
  # higher quality on Mac Studio class hardware, switch to
  # `30B-A3B-Q4_K_M` (MoE, ~17 GB, ~3B active params per token).
  agent-llm:
    image: ai/qwen3-coder:8B-Q4_K_M
    container_name: agentx-agent-llm
    networks:
      - harness-net
    restart: unless-stopped

  # Vision LLM — only needed if your corpus includes images (UI mockups,
  # screenshots, diagrams). Profile-gated so it doesn't start by default,
  # saving ~3-6 GB RAM in the common code-only workflow. Enable with:
  #   docker compose --profile vision up
  #
  # Tag options (verified via Docker Hub):
  #   2B-UD-Q4_K_XL   1.82 GB   smallest; tight footprint
  #   4B-UD-Q4_K_XL   3.15 GB   workhorse default — picked here
  #   8B-UD-Q4_K_XL   5.87 GB   higher quality (= `latest`)
  #   32B-UD-Q4_K_XL  19.8 GB   Mac Studio territory; GPU recommended
  agent-vl:
    image: ai/qwen3-vl:4B-UD-Q4_K_XL
    container_name: agentx-agent-vl
    networks:
      - harness-net
    restart: unless-stopped
    profiles:
      - vision

networks:
  harness-net:
    driver: bridge
    name: agentx-harness-net

volumes:
  # TEI downloads the embedder model (~2 GB for jina-v3, varies per model)
  # on first run; persisted across container restarts so swaps are fast
  # after the first download.
  tei-model-cache:
    name: agentx-tei-model-cache
  # Per-model caches for the bench profile so each embedder keeps its
  # own download separately.
  tei-model-cache-jina:
    name: agentx-tei-model-cache-jina
  tei-model-cache-qwen:
    name: agentx-tei-model-cache-qwen
  tei-model-cache-bge:
    name: agentx-tei-model-cache-bge
