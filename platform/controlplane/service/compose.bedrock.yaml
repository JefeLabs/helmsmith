# Embedder overlay: AWS Bedrock via the in-compose LiteLLM proxy.
#
# LiteLLM speaks Bedrock's native InvokeModel API directly — no
# separate aws-samples/bedrock-access-gateway proxy needed in front.
# The litellm service exposes an OpenAI-compat API on port 4000;
# controlplane + edge-server reach it via http://litellm:4000/v1.
#
# Required env (typically in a gitignored .env at the workspace root):
#   AWS_REGION=us-east-1
# AWS auth: standard credential chain — AWS_ACCESS_KEY_ID/SECRET in
# the env, or AWS_PROFILE set + ~/.aws/credentials bind-mounted into
# the litellm container. Mount the credentials dir below if needed.
#
# Tunable env (with defaults):
#   BEDROCK_EMBED_MODEL=amazon.titan-embed-text-v2:0
#   BEDROCK_EMBED_DIM=1024
#
# Activate:
#   workspace start --embedder bedrock
#   docker compose -f compose.yaml -f compose.bedrock.yaml up -d

x-cloud-env: &cloud-env
  AGENTX_EMBEDDER_URL: http://litellm:4000/v1
  AGENTX_EMBEDDER_MODEL: embedder
  AGENTX_EMBEDDER_DIMENSION: ${BEDROCK_EMBED_DIM:-1024}

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required for the bedrock embedder variant}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_PROFILE: ${AWS_PROFILE:-}
      BEDROCK_EMBED_MODEL: ${BEDROCK_EMBED_MODEL:-amazon.titan-embed-text-v2:0}
    volumes:
      - ./litellm/bedrock.config.yaml:/app/config.yaml:ro
      # Mount ~/.aws/credentials read-only if AWS_PROFILE is used
      # rather than env-var auth. Comment out if your auth comes from
      # static AWS_ACCESS_KEY_ID/SECRET vars or an IAM role.
      - ${HOME}/.aws:/root/.aws:ro
    healthcheck:
      # litellm image ships python3 but neither curl nor wget — use
      # urllib for a stdlib-only liveness probe.
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  controlplane:
    environment:
      <<: *cloud-env
    depends_on:
      central-data:
        condition: service_healthy
      litellm:
        condition: service_healthy

  edge-server:
    environment:
      <<: *cloud-env
    depends_on:
      litellm:
        condition: service_healthy
