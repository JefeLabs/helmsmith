spring:
  application:
    name: controlplane

  # Phase 0: virtual threads (Java 21 LTS) per umbrella PRD D14.
  # Spring MVC + @Async + RestClient all run on virtual threads.
  threads:
    virtual:
      enabled: true

  # Datasource: not configured here so that auto-config picks the right source per environment.
  # Priority chain (Spring Boot resolves first match):
  #   1. SPRING_DATASOURCE_URL env var → external Postgres (production)
  #   2. spring-boot-docker-compose detects a postgres service in compose.yaml → uses it
  #   3. Neither → core/config/EmbeddedPostgresConfig spawns embedded Postgres (default for local dev)
  #
  # To force-disable embedded Postgres: set agentx.embedded-postgres.enabled=false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

  # Spring Modulith eventing: JDBC variant (NOT JPA) — uses raw SQL DDL ships in
  # spring-modulith-starter-jdbc. Schema auto-applied at startup; Flyway owns
  # everything else (per prd-core-module.md F16).
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
      republish-outstanding-events-on-restart: true

server:
  port: 8080
  # Phase 0 is HTTP-only; HTTPS lands at Phase 7 per prd-control-plane-operational-hardening.md

# Neo4j connection for the context module (Phase 4).
# Defaults match controlplane/compose.yaml's neo4j service.
agentx:
  neo4j:
    uri: bolt://localhost:7687
    user: neo4j
    password: controlplane
  embedder:
    # OpenAI-compatible /v1 endpoint. In compose, both `url` and `model`
    # are injected by Docker's Model Runner via the `models:` attachment
    # in compose.yaml (endpoint_var / model_var). The defaults below
    # match the compose-attached model (Qwen3-Embedding 8B, 4096-dim).
    # Production overrides via env (Bedrock proxy, OpenAI direct,
    # hosted TEI, etc.).
    url: http://localhost:8081
    model: ai/qwen3-embedding:8B
    dimension: 4096
  context-loader:
    # Comma-separated argv prefix for the agentx-load CLI subprocess. In dev,
    # this runs the TS source via Bun from the workspace root. In prod, the
    # multi-stage Dockerfile bundles a static binary at /opt/agentx (per the
    # project_controlplane_bundles_bun memory); override via env, e.g.
    # AGENTX_CONTEXT_LOADER_COMMAND=agentx-load.
    #
    # Stored as CSV (not a YAML list) because Spring's @Value placeholder
    # resolver cannot bind a YAML list directly into List<String>; the runner
    # splits on "," and trims. (For richer config, use @ConfigurationProperties.)
    # Path is relative to working-dir (workspace root), not the JVM cwd —
    # ProcessBuilder uses working-dir for both cwd and arg resolution.
    command: bun,packages/context-loader-cli/src/bin.ts
    working-dir: ..
    # Phase 4.4 — scheduled re-ingestion for sources marked daily/weekly.
    # The poller picks up any source whose last completed ingestion is
    # older than its cadence AND has no pending/running job in flight.
    # Override cron + cadence-seconds for tests or staging.
    refresh-poller:
      enabled: true
      cron: "0 0 * * * *"        # every hour, at minute 0
      daily-seconds: 86400       # 24h
      weekly-seconds: 604800     # 7d

logging:
  level:
    root: INFO
    com.jefelabs.agentx.controlplane: DEBUG
    org.springframework.modulith: INFO
